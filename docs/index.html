<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZisuDemo on BabyScan</title>
  <style>
    :root { --bg:#f4f8ff; --card:#fff; --text:#14263b; --sub:#5e738a; --line:#d9e6f4; --accent:#0c6fd6; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Avenir Next","Segoe UI",sans-serif;background:linear-gradient(160deg,#f7fbff,#e9f1fb 58%,#dbe8f7);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:56px 20px 70px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:32px;box-shadow:0 14px 34px rgba(8,48,94,.09)}
    h1{margin:0 0 12px;font-size:34px}
    p{line-height:1.65;margin:0 0 10px;color:var(--sub)}
    .list{margin-top:20px;display:grid;gap:10px}
    .row{display:flex;justify-content:space-between;border:1px solid var(--line);padding:10px 12px;border-radius:10px;font-size:14px;color:var(--text)}
    code{background:#edf5ff;padding:2px 7px;border-radius:6px}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>ZisuDemo Deployment Success</h1>
      <p>This project is deployed with GitHub Pages and mapped via Cloudflare DNS.</p>
      <p>Domain target: <code>babyscan.io</code></p>
      <div class="list">
        <div class="row"><span>Repository</span><span><a href="https://github.com/lazy1523/zisudemo">lazy1523/zisudemo</a></span></div>
        <div class="row"><span>Pages Source</span><span><code>main:/docs</code></span></div>
        <div class="row"><span>Status</span><span>Live</span></div>
      </div>
    </section>
  </main>
</body>
</html>
